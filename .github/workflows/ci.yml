name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions: read-all

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6  # v2.2.0
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run check
      - name: Generated plugins are in sync with skills/
        run: |
          bun run build:plugins
          if [ -n "$(git status --porcelain -- plugins .claude-plugin)" ]; then
            echo "::error::plugins/ and .claude-plugin/ are stale. Run 'bun run build:plugins' and commit the result."
            git status --porcelain -- plugins .claude-plugin
            git diff -- plugins .claude-plugin
            exit 1
          fi
      - run: bun test

  changeset:
    name: changeset present
    # Every PR touching skills/** must add a changeset, else versions + CHANGELOGs
    # silently never update. Skipped on push and via the 'skip-changeset' label
    # (e.g. the "Version Packages" PR, which changes skills but carries none).
    if: ${{ github.event_name == 'pull_request' && !contains(github.event.pull_request.labels.*.name, 'skip-changeset') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6  # v2.2.0
        with:
          bun-version: latest
      - name: Require a changeset for skill changes
        run: |
          git fetch --no-tags origin "+refs/heads/${{ github.base_ref }}:refs/remotes/origin/${{ github.base_ref }}"
          bunx @changesets/cli status --since="origin/${{ github.base_ref }}"
