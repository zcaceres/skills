name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions: read-all

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6  # v2.2.0
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run check
      - name: Generated plugins are in sync with skills/
        run: |
          bun run build:plugins
          if [ -n "$(git status --porcelain -- plugins .claude-plugin)" ]; then
            echo "::error::plugins/ and .claude-plugin/ are stale. Run 'bun run build:plugins' and commit the result."
            git status --porcelain -- plugins .claude-plugin
            git diff -- plugins .claude-plugin
            exit 1
          fi
      - run: bun test
