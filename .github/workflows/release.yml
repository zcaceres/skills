name: Release skill

on:
  push:
    tags:
      - "*@*.*.*"

permissions: read-all

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # create the GitHub Release
      id-token: write        # OIDC, to sign the build provenance attestation
      attestations: write    # store the attestation
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6  # v2.2.0
        with:
          bun-version: latest

      - name: Parse tag
        id: tag
        run: |
          TAG="${GITHUB_REF_NAME}"
          NAME="${TAG%@*}"
          VERSION="${TAG##*@}"
          echo "name=$NAME" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - run: bun install --frozen-lockfile
      - run: bun run build ${{ steps.tag.outputs.name }}

      - name: Tarball
        run: |
          tar -czf ${{ steps.tag.outputs.name }}-${{ steps.tag.outputs.version }}.tgz \
            -C skills/${{ steps.tag.outputs.name }}/dist ${{ steps.tag.outputs.name }}

      - name: Attest build provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32  # v4.1.0
        with:
          subject-path: ${{ steps.tag.outputs.name }}-${{ steps.tag.outputs.version }}.tgz

      - name: GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda  # v3.0.0
        with:
          files: ${{ steps.tag.outputs.name }}-${{ steps.tag.outputs.version }}.tgz
          name: ${{ github.ref_name }}
          generate_release_notes: true

      # - name: Publish to skills.sh
      #   run: bunx skills publish skills/${{ steps.tag.outputs.name }}/dist/${{ steps.tag.outputs.name }}
      #   env:
      #     SKILLS_TOKEN: ${{ secrets.SKILLS_TOKEN }}
