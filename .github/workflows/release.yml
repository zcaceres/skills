name: Release skill

on:
  push:
    tags:
      - "*@*.*.*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Parse tag
        id: tag
        run: |
          TAG="${GITHUB_REF_NAME}"
          NAME="${TAG%@*}"
          VERSION="${TAG##*@}"
          echo "name=$NAME" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - run: bun install --frozen-lockfile
      - run: bun run build ${{ steps.tag.outputs.name }}

      - name: Tarball
        run: |
          tar -czf ${{ steps.tag.outputs.name }}-${{ steps.tag.outputs.version }}.tgz \
            -C skills/${{ steps.tag.outputs.name }}/dist ${{ steps.tag.outputs.name }}

      - name: GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.tag.outputs.name }}-${{ steps.tag.outputs.version }}.tgz
          name: ${{ github.ref_name }}
          generate_release_notes: true

      # - name: Publish to skills.sh
      #   run: bunx skills publish skills/${{ steps.tag.outputs.name }}/dist/${{ steps.tag.outputs.name }}
      #   env:
      #     SKILLS_TOKEN: ${{ secrets.SKILLS_TOKEN }}
