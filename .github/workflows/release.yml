name: Release skill

on:
  push:
    tags:
      - "*@*.*.*"

permissions: read-all

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6  # v2.2.0
        with:
          bun-version: latest

      - name: Parse tag
        id: tag
        run: |
          TAG="${GITHUB_REF_NAME}"
          NAME="${TAG%@*}"
          VERSION="${TAG##*@}"
          echo "name=$NAME" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - run: bun install --frozen-lockfile
      - run: bun run build ${{ steps.tag.outputs.name }}

      - name: Tarball
        run: |
          tar -czf ${{ steps.tag.outputs.name }}-${{ steps.tag.outputs.version }}.tgz \
            -C skills/${{ steps.tag.outputs.name }}/dist ${{ steps.tag.outputs.name }}

      - name: GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65  # v2.6.2
        with:
          files: ${{ steps.tag.outputs.name }}-${{ steps.tag.outputs.version }}.tgz
          name: ${{ github.ref_name }}
          generate_release_notes: true

      # - name: Publish to skills.sh
      #   run: bunx skills publish skills/${{ steps.tag.outputs.name }}/dist/${{ steps.tag.outputs.name }}
      #   env:
      #     SKILLS_TOKEN: ${{ secrets.SKILLS_TOKEN }}
