# OpenSSF Scorecard — installed via /security-openssf.
#
# Phase 1: publish_results: false.
#   Results land in this repo's Security → Code scanning tab only.
#   This run uses results_format: sarif, so the Actions log has NO aggregate
#   score line. For a readable per-check report, run:
#     skills/security-openssf/scripts/scorecard-report.sh --fetch <owner>/<repo>
#
# Phase 2 (this file as written — publish_results: true): score is posted to
#   https://scorecard.dev/viewer/?uri=github.com/<owner>/<repo>
#   Requires this repo to be public. Historical scores cannot be unpublished.

name: Scorecard supply-chain security

on:
  branch_protection_rule:
  schedule:
    - cron: '21 7 * * 2'  # weekly, Tue 07:21 UTC — arbitrary, just avoid hour-:00 stampede
  push:
    branches: [main]

permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write   # upload SARIF to the Security tab
      id-token: write          # OIDC for signing published results (phase 2)
      contents: read
      actions: read

    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          persist-credentials: false

      - name: Run Scorecard analysis
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a  # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          # PHASE 2: published to scorecard.dev. Historical scores cannot
          # be un-published — revert this commit to stop new data only.
          publish_results: true

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: SARIF file
          path: results.sarif
          retention-days: 5

      - name: Upload to Security tab
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e  # v4.36.2
        with:
          sarif_file: results.sarif
