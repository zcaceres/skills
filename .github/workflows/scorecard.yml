# OpenSSF Scorecard — installed via /boilerplate-openssf.
#
# Phase 1 (this file as written): publish_results: false.
#   Results land in this repo's Security → Code scanning tab only.
#   Aggregate score visible in the Actions log.
#
# Phase 2 (flip publish_results to true): score is posted to
#   https://scorecard.dev/viewer/?uri=github.com/<owner>/<repo>
#   Requires this repo to be public. Historical scores cannot be unpublished.

name: Scorecard supply-chain security

on:
  branch_protection_rule:
  schedule:
    - cron: '21 7 * * 2'  # weekly, Tue 07:21 UTC — arbitrary, just avoid hour-:00 stampede
  push:
    branches: [main]

permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write   # upload SARIF to the Security tab
      id-token: write          # OIDC for signing published results (phase 2)
      contents: read
      actions: read

    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          persist-credentials: false

      - name: Run Scorecard analysis
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a  # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          # PHASE 1: keep false. Flip to true (and re-run /boilerplate-openssf)
          # only after triaging the SARIF findings.
          publish_results: false

      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: SARIF file
          path: results.sarif
          retention-days: 5

      - name: Upload to Security tab
        uses: github/codeql-action/upload-sarif@4e828ff8d448a8a6e532957b1811f387a63867e8  # v3.29.4
        with:
          sarif_file: results.sarif
