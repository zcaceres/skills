title = "skills gitleaks config"

# Inherit the upstream gitleaks default ruleset and extend with patterns
# we want to catch on top of it. See:
# https://github.com/gitleaks/gitleaks/blob/master/config/gitleaks.toml
[extend]
useDefault = true

# ─── Custom rules ───────────────────────────────────────────────────────────
# The skill writes the rules the user explicitly opted into. Anything below
# this line was selected during /security-gitleaks; uncomment to add more.

[[rules]]
id = "anthropic-api-key"
description = "Anthropic API key"
regex = '''sk-ant-(?:api|admin)[0-9]{2}-[A-Za-z0-9_\-]{80,}'''
keywords = ["sk-ant-"]

[[rules]]
id = "google-oauth-client-secret"
description = "Google OAuth 2.0 client secret (GOCSPX-...)"
regex = '''GOCSPX-[A-Za-z0-9_-]{28}'''
keywords = ["GOCSPX-"]

[[rules]]
id = "personal-home-path"
description = "Hardcoded /Users/<name> path leaks a maintainer's home dir"
regex = '''/Users/zachcaceres(?:/|\b)'''
keywords = ["/Users/zachcaceres"]

# ─── Allowlist ──────────────────────────────────────────────────────────────
# Keep this list small and explicit. Adding paths here disables scanning for
# them — only do it for files that genuinely cannot contain a real secret.

[allowlist]
description = "Files that can never contain a real secret"
paths = [
  '''^LICENSE$''',
  '''^\.gitleaks\.toml$''',
  # Claude Code's per-clone permission file. Gitignored, never committed.
  # Encodes /Users/<name>/... paths in Read()/Bash() permission rules — these
  # are filesystem patterns, not secrets. Scoped to this exact file.
  '''^\.claude/settings\.local\.json$''',
]
