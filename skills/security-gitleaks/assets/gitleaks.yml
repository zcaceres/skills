# gitleaks secret-scanning — installed via /security-gitleaks.
#
# Scans on every push and PR:
#   - full git history (catches secrets added in any historical commit)
#   - working tree on disk (catches unstaged-but-committed-via-other-means files)
#
# gitleaks is installed by curl-pinned tarball rather than the gitleaks-action
# marketplace action so the version pin lives in this file and there's no
# extra third-party action in the supply chain. To bump the version, update
# GITLEAKS_VERSION below and verify the release on
# https://github.com/gitleaks/gitleaks/releases.

name: gitleaks

on:
  push:
    branches: [__DEFAULT_BRANCH__]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  scan:
    runs-on: ubuntu-latest
    env:
      GITLEAKS_VERSION: "__GITLEAKS_VERSION__"
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          fetch-depth: 0  # full history so PRs and pushes scan every commit

      - name: Install gitleaks
        run: |
          set -euo pipefail
          curl -fsSL \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | sudo tar -xzf - -C /usr/local/bin gitleaks
          gitleaks version

      - name: Scan git history
        run: gitleaks git --config .gitleaks.toml --redact --verbose .

      - name: Scan working tree
        run: gitleaks dir --config .gitleaks.toml --redact --verbose .
